---
# Disable multipathd completely on all nodes to prevent conflicts with Longhorn
# Reference: https://longhorn.io/kb/troubleshooting-volume-with-multipath/

- name: Stop multipathd.socket
  ansible.builtin.systemd:
    name: multipathd.socket
    state: stopped
  ignore_errors: true

- name: Disable and mask multipathd.socket
  ansible.builtin.systemd:
    name: multipathd.socket
    enabled: false
    masked: true
  ignore_errors: true

- name: Stop multipathd service
  ansible.builtin.systemd:
    name: multipathd
    state: stopped
  ignore_errors: true

- name: Disable and mask multipathd service
  ansible.builtin.systemd:
    name: multipathd
    enabled: false
    masked: true
  ignore_errors: true

- name: Flush existing multipath maps
  ansible.builtin.command: multipath -F
  register: multipath_flush
  changed_when: multipath_flush.rc == 0
  ignore_errors: true

- name: Create multipath.conf to blacklist all devices
  ansible.builtin.copy:
    dest: /etc/multipath.conf
    content: |
      # Blacklist all devices to prevent multipathd from managing any device
      # This is required for Longhorn compatibility
      blacklist {
          devnode "^sd[a-z0-9]+"
          devnode "^(ram|raw|loop|fd|md|dm-|sr|scd|st|dcssblk)[0-9]*"
          devnode "^(td|hd|vd)[a-z]"
          devnode "^nvme.*"
      }
    mode: '0644'
    owner: root
    group: root

- name: Blacklist dm-multipath kernel module
  ansible.builtin.copy:
    dest: /etc/modprobe.d/blacklist-multipath.conf
    content: |
      # Prevent dm-multipath kernel module from loading
      blacklist dm-multipath
      blacklist dm_multipath
    mode: '0644'
    owner: root
    group: root

- name: Verify no multipath devices are listed
  ansible.builtin.command: multipath -l
  register: multipath_verify
  changed_when: false
  ignore_errors: true

- name: Display multipath status
  ansible.builtin.debug:
    msg:
      - "=============================================="
      - "Multipathd Completely Disabled"
      - "=============================================="
      - "Actions taken:"
      - "  - multipathd.socket: stopped, disabled, masked"
      - "  - multipathd.service: stopped, disabled, masked"
      - "  - /etc/multipath.conf: blacklist all devices"
      - "  - /etc/modprobe.d/blacklist-multipath.conf: blacklist kernel module"
      - "Multipath devices (should be empty):"
      - "{{ multipath_verify.stdout_lines | default(['None']) }}"
      - "=============================================="
