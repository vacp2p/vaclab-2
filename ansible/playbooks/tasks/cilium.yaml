- name: Check if Cilium is already installed
  command: kubectl get daemonset cilium -n kube-system
  register: cilium_installed
  ignore_errors: true
  changed_when: false
  failed_when: false
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

