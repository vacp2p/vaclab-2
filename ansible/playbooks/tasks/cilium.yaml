---
# Install Cilium using Helm (for K3s with --flannel-backend=none --disable-network-policy)

- name: Check if Cilium is already installed
  ansible.builtin.command: kubectl get daemonset cilium -n kube-system
  register: cilium_installed
  ignore_errors: true
  changed_when: false
  failed_when: false
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: Add Cilium Helm repository
  kubernetes.core.helm_repository:
    name: cilium
    repo_url: https://helm.cilium.io/
    state: present
    force_update: true
  when: cilium_installed.rc != 0

- name: Install Cilium via Helm
  kubernetes.core.helm:
    name: cilium
    chart_ref: cilium/cilium
    chart_version: "1.18.5"
    release_namespace: kube-system
    create_namespace: false
    wait: true
    wait_timeout: 10m
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    values:
      # IPAM configuration for K3s default pod CIDR
      ipam:
        mode: cluster-pool
        operator:
          clusterPoolIPv4PodCIDRList: "10.42.0.0/16"
          # /20 = 4096 IPs per node, supports 16 nodes (4 bits for node encoding)
          clusterPoolIPv4MaskSize: 20

      # Tunnel mode with Geneve protocol
      routingMode: tunnel
      tunnelProtocol: geneve

      # Bandwidth manager for eBPF-based rate limiting
      bandwidthManager:
        enabled: true

      # Keep kube-proxy (K3s uses it)
      kubeProxyReplacement: "false"

      # Network policy enforcement
      policyEnforcementMode: default

      # Disable IPv6
      ipv6:
        enabled: false

      # Hubble observability
      hubble:
        enabled: true
        relay:
          enabled: true
          resources:
            limits:
              cpu: "2"
              memory: "2Gi"
            requests:
              cpu: "100m"
              memory: "128Mi"
          prometheus:
            enabled: true
            serviceMonitor:
              enabled: false
        ui:
          enabled: true
          backend:
            resources:
              limits:
                cpu: "2"
                memory: "2Gi"
              requests:
                cpu: "1"
                memory: "512Mi"
          frontend:
            resources:
              limits:
                cpu: "2"
                memory: "2Gi"
              requests:
                cpu: "1"
                memory: "512Mi"
        metrics:
          enabled:
            - "dns:query;ignoreAAAA;labelsContext=source_ip,source_namespace,source_pod,source_workload,destination_ip,destination_namespace,destination_pod,destination_workload"
            - "drop:labelsContext=source_ip,source_namespace,source_pod,source_workload,destination_ip,destination_namespace,destination_pod,destination_workload,traffic_direction"
            - "tcp:labelsContext=source_ip,source_namespace,source_pod,source_workload,destination_ip,destination_namespace,destination_pod,destination_workload,traffic_direction"
            - "flow:labelsContext=source_ip,source_namespace,source_pod,source_workload,destination_ip,destination_namespace,destination_pod,destination_workload,traffic_direction"
            - "icmp:labelsContext=source_ip,source_namespace,source_pod,destination_ip,destination_namespace,destination_pod,traffic_direction"
            - "httpV2:exemplars=true;labelsContext=source_ip,source_namespace,source_pod,source_workload,source_workload_kind,destination_ip,destination_namespace,destination_pod,destination_workload,destination_workload_kind,traffic_direction"
            - "port-distribution:labelsContext=source_ip,source_namespace,source_pod,destination_ip,destination_namespace,destination_pod,traffic_direction"
          enableOpenMetrics: true
          port: 9965
          serviceMonitor:
            enabled: false

      # Operator configuration
      operator:
        replicas: 3
        resources:
          limits:
            cpu: "4"
            memory: "8Gi"
          requests:
            cpu: "2"
            memory: "512Mi"

      # Cilium agent resources
      resources:
        limits:
          cpu: 8
          memory: 16Gi
        requests:
          cpu: "2"
          memory: 256Mi
  when: cilium_installed.rc != 0

- name: Wait for Cilium pods to be ready
  ansible.builtin.command: kubectl wait --for=condition=ready pod -l k8s-app=cilium -n kube-system --timeout=300s
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  when: cilium_installed.rc != 0

- name: Verify Cilium status
  ansible.builtin.command: kubectl get pods -n kube-system -l k8s-app=cilium
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: cilium_pods
  changed_when: false

- name: Display Cilium pods status
  ansible.builtin.debug:
    var: cilium_pods.stdout_lines
