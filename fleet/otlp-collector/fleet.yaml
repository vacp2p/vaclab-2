defaultNamespace: opentelemetry
dependsOn: 
  - name: vaclab-2-fleet-victoria-metrics-stack

helm:
  repo: https://open-telemetry.github.io/opentelemetry-helm-charts/
  chart: opentelemetry-collector
  version: 0.146.1
  releaseName: otel
  takeOwnership: true
  values:
    mode: deployment
    image:
      repository: "otel/opentelemetry-collector-contrib"
    #affinity:
    #  nodeAffinity:
    #    preferredDuringSchedulingIgnoredDuringExecution:
    #      - weight: 100
    #        preference:
    #          matchExpressions:
    #            - key: kubernetes.io/hostname
    #              operator: In
    #              values:
    #                - metal-01.he-eu-hel1.misc.vacdst
    #tolerations:
    #  - key: "dedicated"
    #    operator: "Equal"
    #    value: "monitoring"
    #    effect: "PreferNoSchedule"
    #  - key: "node-role.kubernetes.io/control-plane"
    #    operator: "Exists"
    #    effect: "NoSchedule"
    presets:
      clusterMetrics:
        enabled: true
    service:
      type: ClusterIP
    ports:
      otlp:
        enabled: true
        containerPort: 4317
        servicePort: 4317
        protocol: TCP
    extraEnvs:
      - name: OTEL_CLIENT_TOKEN
        valueFrom:
          secretKeyRef:
            name: otel-client-token
            key: token
    config:
      # deltatocumulative processor is needed to convert metrics with delta temporality to cumulative temporality.
      # VictoriaMetrics doesn't support delta temporality. Skip this processor if you don't use delta temporality.
      extensions:
        bearertokenauth:
          token: "${env:OTEL_CLIENT_TOKEN}"
      processors:
        deltatocumulative:
          max_stale: 5m
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
              auth:
                authenticator: bearertokenauth
            http:
              endpoint: 0.0.0.0:4318
              auth:
                authenticator: bearertokenauth
      exporters:
        otlphttp/victoriametrics:
          compression: gzip
          encoding: proto
          # Cluster version of VictoriaMetrics URL format - http://vminsert-vmks-victoria-metrics-k8s-stack.vmetrics:8480/insert/0/#url-format
          metrics_endpoint: http://vminsert-vmks-victoria-metrics-k8s-stack.vmetrics:8480/insert/0/opentelemetry/v1/metrics
          tls:
            insecure: true
      service:
        pipelines:
          metrics:
            receivers: [otlp]
            processors: [deltatocumulative]
            exporters: [otlphttp/victoriametrics]