defaultNamespace: opentelemetry
dependsOn:
  - name: vaclab-2-fleet-victoria-metrics-stack

helm:
  repo: https://open-telemetry.github.io/opentelemetry-helm-charts/
  chart: opentelemetry-collector
  version: 0.146.1
  releaseName: otel
  takeOwnership: true
  disablePreProcess: true
  values:
    mode: deployment
    image:
      repository: "otel/opentelemetry-collector-contrib"

    presets:
      clusterMetrics:
        enabled: true

    service:
      type: ClusterIP

    ports:
      otlp:
        enabled: true
        containerPort: 4317
        servicePort: 4317
        protocol: TCP
      otlp-http:
        enabled: true
        containerPort: 4318
        servicePort: 4318
        protocol: TCP

    extraEnvs:
      - name: OTEL_CLIENT_TOKEN
        valueFrom:
          secretKeyRef:
            name: otel-client-token
            key: token

    config:
      extensions:
        health_check:
          endpoint: 0.0.0.0:13133
        bearertokenauth:
          token: "${env:OTEL_CLIENT_TOKEN}"

      processors:
        deltatocumulative:
          max_stale: 5m

      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
              auth:
                authenticator: bearertokenauth
            http:
              endpoint: 0.0.0.0:4318
              auth:
                authenticator: bearertokenauth

      exporters:
        otlphttp/victoriametrics:
          compression: gzip
          encoding: proto
          metrics_endpoint: http://vminsert-vmks-victoria-metrics-k8s-stack.vmetrics:8480/insert/0/opentelemetry/v1/metrics
          tls:
            insecure: true

      service:
        extensions: [health_check, bearertokenauth]
        pipelines:
          metrics:
            receivers: [otlp]
            processors: [deltatocumulative]
            exporters: [otlphttp/victoriametrics]