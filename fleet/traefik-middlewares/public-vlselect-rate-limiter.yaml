apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: public-vlselect-rate-limiter
  namespace: default
spec:
  # just a large number for now, globally shared by all public users accessing the dashboard
  rateLimit:
    average: 100
    period: 1s
    burst: 200
    sourceCriterion:
      ipStrategy:
        depth: 1