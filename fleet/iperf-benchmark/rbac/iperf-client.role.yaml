apiVersion: v1
kind: ServiceAccount
metadata:
  name: iperf-benchmark-sa
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: iperf-node-pod-reader
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: iperf-benchmark-binding
subjects:
- kind: ServiceAccount
  name: iperf-benchmark-sa
roleRef:
  kind: Role
  name: iperf-node-pod-reader
  apiGroup: rbac.authorization.k8s.io